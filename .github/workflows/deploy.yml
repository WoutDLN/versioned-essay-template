
name: Deploy Markdown with Pandoc

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Convert Markdown to styled HTML
        run: |
          pandoc essay.md \
            --standalone \
            --template=assets/template/template.html \
            --output=index.html

          # Wrap content with GitHub-style container
          sed -i 's/<body>/<body><article class="markdown-body" style="max-width:980px;margin:0 auto;padding:45px;">/' index.html
          sed -i 's/<\/body>/<\/article><\/body>/' index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
